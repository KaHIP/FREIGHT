<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="250" rx="12" fill="#1a1d23"/>

  <!-- ===== TITLE ===== -->
  <text x="195" y="88" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle">FREIGHT</text>
  <text x="195" y="115" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="13" fill="#aaaaaa" text-anchor="middle">Fast Streaming Hypergraph Partitioning</text>

  <!-- Award badge -->
  <rect x="127" y="133" width="136" height="22" rx="11"
        fill="#f1c40f" opacity="0.12" stroke="#f1c40f" stroke-width="0.8" stroke-opacity="0.35"/>
  <text x="195" y="148" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="10.5" fill="#f1c40f" text-anchor="middle" opacity="0.9">SEA 2023 Best Paper</text>

  <!-- ===== STREAMING INPUT ===== -->

  <!-- Stream track line -->
  <line x1="415" y1="125" x2="545" y2="125" stroke="#555" stroke-width="0.8" opacity="0.25"/>

  <!-- Direction arrow -->
  <polygon points="400,120 410,125 400,130" fill="#666" opacity="0.35"/>

  <!-- Streaming nodes (growing size and opacity as they approach) -->
  <circle cx="418" cy="125" r="3" fill="#666" opacity="0.15"/>
  <circle cx="436" cy="125" r="3.5" fill="#777" opacity="0.25"/>
  <circle cx="454" cy="125" r="4" fill="#888" opacity="0.35"/>
  <circle cx="472" cy="125" r="4.5" fill="#999" opacity="0.45"/>
  <circle cx="490" cy="125" r="5" fill="#aaa" opacity="0.55"/>
  <circle cx="508" cy="125" r="5.5" fill="#bbb" opacity="0.68"/>
  <circle cx="526" cy="125" r="6" fill="#ddd" opacity="0.82"/>

  <!-- ===== BRANCHING FLOWS (stream splits into partitions) ===== -->

  <!-- To Block 1 (top, red) -->
  <path d="M 540,125 C 560,125 595,58 625,58"
        stroke="#e74c3c" stroke-width="1.2" fill="none" stroke-dasharray="4,3" opacity="0.35"/>
  <!-- To Block 2 (middle, blue) -->
  <path d="M 540,125 C 560,125 600,125 625,125"
        stroke="#3498db" stroke-width="1.2" fill="none" stroke-dasharray="4,3" opacity="0.35"/>
  <!-- To Block 3 (bottom, amber) -->
  <path d="M 540,125 C 560,125 595,192 625,192"
        stroke="#f1c40f" stroke-width="1.2" fill="none" stroke-dasharray="4,3" opacity="0.35"/>

  <!-- In-transit dots along branches -->
  <circle cx="580" cy="92" r="3.5" fill="#e74c3c" opacity="0.3"/>
  <circle cx="580" cy="125" r="3.5" fill="#3498db" opacity="0.3"/>
  <circle cx="580" cy="158" r="3.5" fill="#f1c40f" opacity="0.3"/>

  <!-- ===== PARTITION BLOCKS ===== -->

  <!-- Block 1 (red) -->
  <rect x="615" y="33" width="215" height="50" rx="6"
        fill="#e74c3c" opacity="0.06" stroke="#e74c3c" stroke-width="0.8" stroke-opacity="0.18"/>
  <!-- Hyperedge curve connecting nodes -->
  <path d="M 645,58 Q 680,44 715,52 Q 750,44 785,58"
        stroke="#e74c3c" stroke-width="1.8" fill="none" opacity="0.3"/>
  <!-- Nodes -->
  <circle cx="645" cy="58" r="6.5" fill="#e74c3c" filter="url(#glow)" opacity="0.85"/>
  <circle cx="715" cy="52" r="6.5" fill="#e74c3c" filter="url(#glow)" opacity="0.85"/>
  <circle cx="785" cy="58" r="6.5" fill="#e74c3c" filter="url(#glow)" opacity="0.85"/>

  <!-- Block 2 (blue) -->
  <rect x="615" y="100" width="215" height="50" rx="6"
        fill="#3498db" opacity="0.06" stroke="#3498db" stroke-width="0.8" stroke-opacity="0.18"/>
  <!-- Hyperedge curve -->
  <path d="M 645,125 Q 680,112 715,120 Q 750,112 785,125"
        stroke="#3498db" stroke-width="1.8" fill="none" opacity="0.3"/>
  <!-- Nodes -->
  <circle cx="645" cy="125" r="6.5" fill="#3498db" filter="url(#glow)" opacity="0.85"/>
  <circle cx="715" cy="120" r="6.5" fill="#3498db" filter="url(#glow)" opacity="0.85"/>
  <circle cx="785" cy="125" r="6.5" fill="#3498db" filter="url(#glow)" opacity="0.85"/>

  <!-- Block 3 (amber) -->
  <rect x="615" y="167" width="215" height="50" rx="6"
        fill="#f1c40f" opacity="0.06" stroke="#f1c40f" stroke-width="0.8" stroke-opacity="0.18"/>
  <!-- Hyperedge curve -->
  <path d="M 645,192 Q 680,178 715,185 Q 750,178 785,192"
        stroke="#f1c40f" stroke-width="1.8" fill="none" opacity="0.3"/>
  <!-- Nodes -->
  <circle cx="645" cy="192" r="6.5" fill="#f1c40f" filter="url(#glow)" opacity="0.85"/>
  <circle cx="715" cy="185" r="6.5" fill="#f1c40f" filter="url(#glow)" opacity="0.85"/>
  <circle cx="785" cy="192" r="6.5" fill="#f1c40f" filter="url(#glow)" opacity="0.85"/>

  <!-- Cut hyperedge crossing partition boundary (dashed) -->
  <line x1="715" y1="52" x2="715" y2="120"
        stroke="#888" stroke-width="1" stroke-dasharray="3,3" opacity="0.25"/>

</svg>
